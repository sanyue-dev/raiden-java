name: Build Native

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact: Raiden-macOS
            jpackage-type: dmg
            path: target/native/Raiden-*.dmg
          - os: windows-latest
            artifact: Raiden-Windows
            jpackage-type: app-image
            path: target/native/Raiden
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - run: mvn package "-Pnative" "-Djpackage.type=${{ matrix.jpackage-type }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.path }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - run: |
          cd artifacts
          zip -r ../Raiden-Windows.zip Raiden-Windows

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/Raiden-macOS/Raiden-*.dmg
            Raiden-Windows.zip
