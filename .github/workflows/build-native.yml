name: Build Native

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-13
            artifact: Raiden-macOS-x64
            jpackage-type: dmg
            path: target/native/Raiden-*.dmg
          - os: macos-14
            artifact: Raiden-macOS-arm64
            jpackage-type: dmg
            path: target/native/Raiden-*.dmg
          - os: windows-latest
            artifact: Raiden-Windows
            jpackage-type: app-image
            path: target/native/Raiden
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - run: mvn package "-Pnative" "-Djpackage.type=${{ matrix.jpackage-type }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.path }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - run: |
          version="${GITHUB_REF_NAME#v}"
          mv artifacts/Raiden-macOS-x64/Raiden-*.dmg "Raiden-macOS-x64-${version}.dmg"
          mv artifacts/Raiden-macOS-arm64/Raiden-*.dmg "Raiden-macOS-arm64-${version}.dmg"
          zip -r "Raiden-Windows-${version}.zip" artifacts/Raiden-Windows

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            Raiden-macOS-x64-*.dmg
            Raiden-macOS-arm64-*.dmg
            Raiden-Windows-*.zip
